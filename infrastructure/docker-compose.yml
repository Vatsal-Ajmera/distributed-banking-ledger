version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Distributed Banking Ledger — local dev infrastructure
#
# Services:
#   postgres  — PostgreSQL 16 with a persistent named volume
#   kafka     — Single-node Kafka 3.7 in KRaft mode (no Zookeeper)
#
# Usage:
#   docker compose up -d          # start everything
#   docker compose down           # stop (data volume preserved)
#   docker compose down -v        # stop and wipe all volumes
# ─────────────────────────────────────────────────────────────────────────────

networks:
  banking-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local

services:

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-customer_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-customer_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────────
  # Kafka 3.7 — KRaft mode (no Zookeeper)
  #
  # CLUSTER_ID is a stable base64-encoded UUID required by KRaft.
  # Generate your own with: kafka-storage.sh random-uuid
  # The value below is safe for local dev.
  # ──────────────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: banking-kafka
    restart: unless-stopped
    environment:
      # KRaft cluster identity
      KAFKA_NODE_ID:                          1
      KAFKA_PROCESS_ROLES:                    broker,controller
      KAFKA_CLUSTER_ID:                       ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}

      # Listeners
      KAFKA_LISTENERS:                        PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES:        CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT

      # KRaft quorum
      KAFKA_CONTROLLER_QUORUM_VOTERS:         1@kafka:9093

      # Broker tuning (single-node friendly)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:         1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:             1
      KAFKA_MIN_INSYNC_REPLICAS:                       1
      KAFKA_DEFAULT_REPLICATION_FACTOR:                1
      KAFKA_NUM_PARTITIONS:                            1
      KAFKA_LOG_RETENTION_HOURS:                       168
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
